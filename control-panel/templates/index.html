<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Control Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #ffffff;
        }
        .refresh-btn {
            background: none;
            border: 0;
            padding: 0 .25rem;
            font-size: 1.1rem;
            line-height: 1;
            color: inherit;
            opacity: .7;
            cursor: pointer;
        }
        .refresh-btn:hover { opacity: 1; }
        .refresh-btn.spinning { animation: spin .8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <!-- Toast notification -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x mb-4">
        <div class="toast text-white border-0" id="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body text-center fw-semibold" id="toastBody"></div>
        </div>
    </div>

    <!-- Main card -->
    <div class="card shadow-lg" style="width: min(440px, 92vw);">
        <div class="card-body p-4">

            <h1 class="card-title text-center fw-light mb-4">VPN Control Panel</h1>

            <!-- Backend selector -->
            <label for="backendSelect" class="form-label text-muted small mb-1">Backend</label>
            <div class="d-flex gap-2 mb-3">
                <select class="form-select" id="backendSelect"></select>
                <button class="btn btn-outline-primary btn-sm text-nowrap" id="setActiveBtn" style="min-width:7rem">Set as Active</button>
            </div>

            <!-- Status badge -->
            <div class="alert alert-secondary d-flex justify-content-center align-items-center fw-semibold mb-3 position-relative" id="statusBox" role="status">
                <span id="statusText">Status: …</span>
                <button type="button" class="refresh-btn position-absolute end-0 me-2" id="refreshBtn" title="Refresh" aria-label="Refresh">↻</button>
            </div>

            <!-- Structured status fields -->
            <table class="table table-sm mb-3 d-none" id="statusTable">
                <tbody></tbody>
            </table>

            <!-- Country filter (shown only for backends that expose /countries) -->
            <div id="countryRow" class="d-none mb-2">
                <label for="countrySelect" class="form-label text-muted small mb-1">Country</label>
                <select class="form-select" id="countrySelect"></select>
            </div>

            <!-- Server selector + connect -->
            <form class="mb-2" onsubmit="handleSubmit(event, 'connect');">
                <select class="form-select mb-2" id="serverSelect" name="server"></select>
                <button class="btn btn-success w-100" type="submit" id="connectBtn">Connect to VPN</button>
            </form>

            <!-- Disconnect -->
            <form onsubmit="handleSubmit(event, 'disconnect');">
                <button class="btn btn-danger w-100" type="submit" id="disconnectBtn">Disconnect from VPN</button>
            </form>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const PANEL_BASE   = window.location.pathname.replace(/\/?$/, '') + '/api/v1/';
    const STORAGE_KEY  = 'vpn-panel-backend';
    let   currentBackend = null;
    let   activeBackend  = null;  // backend currently routing traffic
    let   lastStatus = null;  // most recent /status response, drives connect-button state
    let   pollTimer = null;
    let   _actionInFlight = false;
    let   _userChangedServer = false;  // true after user manually picks from dropdown
    let   _statusFailures = 0;        // consecutive failed status polls
    let   _ipRefreshInProgress = false;
    let   _lastConnectTime = 0;       // ms timestamp of last connect/disconnect attempt

    // All fetch calls go through this so there's always a bounded timeout.
    // Without it, a briefly-unreachable backend leaves the spinner running forever.
    function timedFetch(url, options = {}, timeoutMs = 8000) {
        const ctrl = new AbortController();
        const id   = setTimeout(() => ctrl.abort(), timeoutMs);
        return fetch(url, { ...options, signal: ctrl.signal })
            .finally(() => clearTimeout(id));
    }

    function setActionInFlight(inFlight, label = 'Connecting…') {
        _actionInFlight = inFlight;
        const connectBtn    = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        if (inFlight) {
            connectBtn.disabled    = true;
            connectBtn.textContent = label;
            connectBtn.className   = 'btn btn-secondary w-100';
            if (disconnectBtn) disconnectBtn.disabled = true;
        } else {
            if (disconnectBtn) disconnectBtn.disabled = false;
            updateConnectButton();
        }
    }

    function backendApi(suffix) {
        // suffix is e.g. 'status', 'connect', 'status?refresh=1'
        if (!currentBackend) return null;
        return `${PANEL_BASE}backends/${encodeURIComponent(currentBackend)}/${suffix}`;
    }

    function updateActiveBtn() {
        const btn = document.getElementById('setActiveBtn');
        if (!currentBackend) { btn.disabled = true; return; }
        if (currentBackend === activeBackend) {
            btn.textContent = 'Routing traffic';
            btn.className = 'btn btn-success btn-sm text-nowrap';
            btn.disabled = true;
        } else {
            btn.textContent = 'Set as Active';
            btn.className = 'btn btn-outline-primary btn-sm text-nowrap';
            btn.disabled = false;
        }
    }

    function setActiveBackend() {
        if (!currentBackend) return;
        fetch(PANEL_BASE + 'active-backend', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: currentBackend}),
        })
        .then(r => r.json().then(d => ({ok: r.ok, d})))
        .then(({ok, d}) => {
            if (ok) {
                activeBackend = currentBackend;
                updateActiveBtn();
                showToast('Traffic now routing through ' + currentBackend);
            } else {
                showToast('Error: ' + (d.error || 'Unknown error'), true);
            }
        })
        .catch(err => showToast('Error: ' + err.message, true));
    }

    function showToast(message, isError = false) {
        const toastEl = document.getElementById('toast');
        document.getElementById('toastBody').textContent = message;
        toastEl.classList.toggle('bg-danger', isError);
        toastEl.classList.toggle('bg-dark',   !isError);
        bootstrap.Toast.getOrCreateInstance(toastEl, {delay: 5000}).show();
    }

    function handleSubmit(event, action) {
        event.preventDefault();
        if (!currentBackend || _actionInFlight) return;

        const label = action === 'connect' ? 'Connecting…' : 'Disconnecting…';
        _lastConnectTime = Date.now();
        setActionInFlight(true, label);

        let options;
        if (action === 'connect') {
            const server = document.getElementById('serverSelect').value;
            options = {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({server}),
            };
        } else {
            options = {method: 'POST'};
        }

        // 15 s timeout: wg-quick down + up take ~1 s each; the handshake and
        // local agent now run in the background so the backend responds quickly.
        timedFetch(backendApi(action), options, 15000)
            .then(response => response.json().then(data => ({ok: response.ok, data})))
            .then(({ok, data}) => {
                if (ok) {
                    showToast(data.message || 'Success');
                } else {
                    showToast('Error: ' + (data.error || 'Unknown error'), true);
                }
            })
            .catch(error => {
                const msg = error.name === 'AbortError' ? 'Request timed out — check backend logs' : error.message;
                showToast('Error: ' + msg, true);
            })
            .finally(() => {
                _userChangedServer = false;  // allow next renderStatus to sync the dropdown
                setActionInFlight(false);
                updateStatus(true);  // force=true triggers background IP refresh on backend
            });
    }

    // [backend key, display label, alwaysShow]
    // alwaysShow=true: render the row even when the value is absent, showing "—".
    const STATUS_FIELDS = [
        ['Country',            'Country',        false],
        ['City',               'City',           false],
        ['Hostname',           'Hostname',       false],
        ['Endpoint',           'Endpoint',       false],
        ['Load',               'Load',           false],
        ['Technology',         'Technology',     false],
        ['Current technology', 'Technology',     false],
        ['Current protocol',   'Protocol',       false],
        ['Uptime',             'Uptime',         false],
        ['Latest handshake',   'Last handshake', false],
        ['Received',           'Received',       false],
        ['Sent',               'Sent',           false],
        ['Public IPv4',        'Public IPv4',    true ],
        ['Public IPv6',        'Public IPv6',    true ],
    ];

    function refreshIPs() {
        if (_ipRefreshInProgress) return;
        _ipRefreshInProgress = true;
        updateStatus(true).finally(() => {
            // Re-poll after 5 s to pick up the freshly-fetched IPs.
            setTimeout(() => updateStatus().finally(() => { _ipRefreshInProgress = false; }), 5000);
        });
    }

    // Sync the server dropdown to cityCode, but only when a matching option exists
    // and the user hasn't made a manual selection since the last connect/load.
    function syncDropdown(cityCode) {
        if (!cityCode || _userChangedServer) return;
        const sel = document.getElementById('serverSelect');
        const match = Array.from(sel.options).find(o => o.value === cityCode);
        if (match) sel.value = cityCode;
    }

    function renderStatus(data) {
        lastStatus = data;
        const statusBox   = document.getElementById('statusBox');
        const statusText  = document.getElementById('statusText');
        const statusTable = document.getElementById('statusTable');
        const tbody       = statusTable.querySelector('tbody');
        tbody.innerHTML = '';

        const baseClasses = 'd-flex justify-content-center align-items-center fw-semibold mb-3 position-relative';
        if (data.status === 'Connected') {
            statusBox.className = 'alert alert-success ' + baseClasses;
        } else {
            statusBox.className = 'alert alert-danger ' + baseClasses;
        }

        const fields    = data.fields || {};
        const connected = data.status === 'Connected';
        let   ipRefreshBtnAdded = false;

        STATUS_FIELDS.forEach(([key, label, alwaysShow]) => {
            const value   = fields[key];
            const isEmpty = value === undefined || value === null || value === '';
            // alwaysShow rows only appear when connected (no point showing IP rows
            // when disconnected), but stay visible while IPs are still resolving.
            if (isEmpty && (!alwaysShow || !connected)) return;

            const row = document.createElement('tr');
            const th  = document.createElement('th');
            const td  = document.createElement('td');
            th.scope = 'row';
            th.className = 'text-muted fw-normal';
            th.style.width = '40%';
            th.textContent = label;
            td.className = 'font-monospace small';

            if (isEmpty) {
                const placeholder = document.createElement('span');
                placeholder.className = 'text-muted';
                placeholder.textContent = '—';
                td.appendChild(placeholder);
            } else {
                td.textContent = value;
            }

            // Add a single ↻ button on the first IP row so the user can force
            // a re-lookup after a failed or stale resolution.
            if (alwaysShow && !ipRefreshBtnAdded) {
                ipRefreshBtnAdded = true;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'refresh-btn ms-1' + (_ipRefreshInProgress ? ' spinning' : '');
                btn.title = 'Refresh IP lookups';
                btn.setAttribute('aria-label', 'Refresh IP lookups');
                btn.textContent = '↻';
                btn.addEventListener('click', refreshIPs);
                th.appendChild(btn);
            }

            row.appendChild(th);
            row.appendChild(td);
            tbody.appendChild(row);
        });
        statusTable.classList.toggle('d-none', tbody.children.length === 0);

        statusText.textContent = `Status: ${data.status}`;
        syncDropdown(data.city_code);
        updateConnectButton();
    }

    function updateConnectButton() {
        if (_actionInFlight) return;  // don't clobber the in-flight label/state
        const btn      = document.getElementById('connectBtn');
        const selected = document.getElementById('serverSelect').value;
        const connectedCode = lastStatus && lastStatus.status === 'Connected'
            ? lastStatus.city_code
            : null;

        // Disable until we have a real selection (placeholder option uses
        // disabled="true" and no value).
        if (!selected) {
            btn.disabled = true;
            btn.textContent = 'Connect to VPN';
            btn.className = 'btn btn-success w-100';
            return;
        }

        if (!connectedCode) {
            btn.disabled = false;
            btn.textContent = 'Connect to VPN';
            btn.className = 'btn btn-success w-100';
        } else if (connectedCode === selected) {
            btn.disabled = true;
            btn.textContent = 'Already connected';
            btn.className = 'btn btn-secondary w-100';
        } else {
            btn.disabled = false;
            btn.textContent = 'Reconnect to selected endpoint';
            btn.className = 'btn btn-warning w-100';
        }
    }

    function updateStatus(force = false) {
        if (!currentBackend) return Promise.resolve();
        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) refreshBtn.classList.add('spinning');

        return timedFetch(backendApi('status' + (force ? '?refresh=1' : '')), {}, 8000)
            .then(response => response.json())
            .then(data => { _statusFailures = 0; renderStatus(data); })
            .catch(err => {
                _statusFailures++;
                console.warn('updateStatus failed (×' + _statusFailures + '):', err);
                // Suppress errors for 20 s after a connect/disconnect — the VPN
                // tunnel swap briefly disrupts the exit-node path, causing rapid
                // poll failures that clear on their own.  Outside the grace period,
                // require two consecutive failures before surfacing anything.
                const inGracePeriod = (Date.now() - _lastConnectTime) < 20000;
                if (!inGracePeriod && _statusFailures >= 2) {
                    document.getElementById('statusText').textContent = 'Status: temporarily unavailable';
                }
            })
            .finally(() => {
                if (refreshBtn) refreshBtn.classList.remove('spinning');
            });
    }

    function setServerSelectPlaceholder(text) {
        const serverSelect = document.getElementById('serverSelect');
        serverSelect.innerHTML = '';
        const option = document.createElement('option');
        option.disabled = true;
        option.selected = true;
        option.text = text;
        serverSelect.add(option);
    }

    function fillSelect(selectEl, items) {
        selectEl.innerHTML = '';
        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.code;
            opt.text  = item.name;
            selectEl.add(opt);
        });
    }

    function loadServers(retryDelay = 2000) {
        if (!currentBackend) return;
        const callerBackend = currentBackend;

        timedFetch(backendApi('servers'), {}, 8000)
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(servers => {
                if (callerBackend !== currentBackend) return;
                if (!Array.isArray(servers)) throw new Error('bad response');
                fillSelect(document.getElementById('serverSelect'), servers);
                timedFetch(backendApi('status'), {}, 8000)
                    .then(r => r.json())
                    .then(data => {
                        if (callerBackend !== currentBackend) return;
                        syncDropdown(data.city_code);
                        updateConnectButton();
                    })
                    .catch(() => {});
            })
            .catch(err => {
                if (callerBackend !== currentBackend) return;
                console.warn('loadServers failed, retrying in', retryDelay, 'ms:', err);
                setServerSelectPlaceholder('Retrying…');
                setTimeout(() => loadServers(Math.min(retryDelay * 2, 30000)), retryDelay);
            });
    }

    function loadCities(country) {
        if (!currentBackend) return;
        const callerBackend = currentBackend;
        setServerSelectPlaceholder('Loading cities…');

        timedFetch(backendApi('cities?country=' + encodeURIComponent(country)), {}, 8000)
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(items => {
                if (callerBackend !== currentBackend) return;
                if (!Array.isArray(items) || items.length === 0) {
                    setServerSelectPlaceholder('No cities found');
                    return;
                }
                fillSelect(document.getElementById('serverSelect'), items);
                updateConnectButton();
            })
            .catch(err => {
                if (callerBackend !== currentBackend) return;
                console.warn('loadCities failed:', err);
                setServerSelectPlaceholder('Could not load cities');
            });
    }

    function loadCountries() {
        const callerBackend = currentBackend;
        const countryRow    = document.getElementById('countryRow');
        const countrySelect = document.getElementById('countrySelect');

        timedFetch(backendApi('countries'), {}, 8000)
            .then(r => (r.ok ? r.json() : Promise.reject(r.status)))
            .then(codes => {
                if (callerBackend !== currentBackend) return;
                if (!Array.isArray(codes) || codes.length === 0) {
                    countryRow.classList.add('d-none');
                    return;
                }
                countrySelect.innerHTML = '';
                const all = document.createElement('option');
                all.value = '';
                all.text  = '— IPv6 servers (recommended) —';
                countrySelect.add(all);
                codes.forEach(cc => {
                    const opt = document.createElement('option');
                    opt.value = cc;
                    opt.text  = cc;
                    countrySelect.add(opt);
                });
                countryRow.classList.remove('d-none');
            })
            .catch(() => {
                if (callerBackend !== currentBackend) return;
                countryRow.classList.add('d-none');
            });
    }

    function selectBackend(name) {
        currentBackend = name;
        lastStatus = null;
        localStorage.setItem(STORAGE_KEY, name);
        document.getElementById('backendSelect').value = name;
        document.getElementById('countryRow').classList.add('d-none');
        document.getElementById('countrySelect').innerHTML = '';
        setServerSelectPlaceholder('Loading server list…');
        document.getElementById('statusText').textContent = 'Status: …';
        updateConnectButton();
        updateActiveBtn();
        updateStatus();
        loadCountries();
        loadServers();
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('refreshBtn').addEventListener('click', () => updateStatus(true));
        document.getElementById('backendSelect').addEventListener('change', e => selectBackend(e.target.value));
        document.getElementById('countrySelect').addEventListener('change', () => {
            const country = document.getElementById('countrySelect').value;
            if (country) loadCities(country);
            else loadServers();
        });
        document.getElementById('serverSelect').addEventListener('change', () => {
            _userChangedServer = true;
            updateConnectButton();
        });
        document.getElementById('setActiveBtn').addEventListener('click', setActiveBackend);

        // Fetch backend list and active-backend in parallel so that on cold
        // reload the dropdown immediately shows whichever backend is routing
        // traffic, without needing a second round-trip.
        Promise.all([
            timedFetch(PANEL_BASE + 'backends', {}, 8000).then(r => r.json()),
            timedFetch(PANEL_BASE + 'active-backend', {}, 8000).then(r => r.json()).catch(() => ({})),
        ]).then(([backendsData, activeData]) => {
            const backends = (backendsData && backendsData.backends) || [];
            activeBackend = activeData.name || null;

            const select = document.getElementById('backendSelect');
            select.innerHTML = '';
            backends.forEach(b => {
                const option = document.createElement('option');
                option.value = b.name;
                option.text  = b.label || b.name;
                select.add(option);
            });

            if (backends.length === 0) {
                showToast('No backends configured.', true);
                return;
            }

            const stored = localStorage.getItem(STORAGE_KEY);
            // Priority: active backend (what's actually routing) → last saved
            // selection → first backend in list.
            const initial =
                (activeBackend && backends.find(b => b.name === activeBackend) ? activeBackend : null) ||
                (stored       && backends.find(b => b.name === stored)         ? stored        : null) ||
                backends[0].name;
            selectBackend(initial);
        });

        pollTimer = setInterval(updateStatus, 10000);
    });
</script>
</body>
</html>
